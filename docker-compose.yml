services:
  db:
    image: babiysqaz/gis-db:latest
    build: ./mysql
    command: --host_cache_size=0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: gis_platform
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD:-rootpass}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: babiysqaz/gis-backend:latest
    build: ./gis-backend
    environment:
      DATABASE_URL: mysql+asyncmy://root:${MYSQL_ROOT_PASSWORD:-rootpass}@db:3306/gis_platform
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: babiysqaz/gis-frontend:latest
    build:
      context: ./gis-frontend
      args:
        VITE_API_BASE_URL: /api/v1
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
