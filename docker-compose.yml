services:
  db:
    build: ./mysql
    command: --host_cache_size=0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: gis_platform
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-prootpass",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./gis-backend
    environment:
      DATABASE_URL: mysql+asyncmy://root:rootpass@db:3306/gis_platform
      SECRET_KEY: dev-secret-change-in-production
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./gis-frontend
      args:
        VITE_API_BASE_URL: /api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
